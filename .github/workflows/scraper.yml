name: Daily Compuzone Scraper

on:
  schedule:
    # 매일 한국시간 자정 (UTC 15:00) - 전체 브랜드 자동 실행
    - cron: '0 15 * * *'
  workflow_dispatch: # 수동 실행 버튼
    inputs:
      brand:
        description: '특정 브랜드만 크롤링 (비우면 전체)'
        required: false
        default: ''
        type: string

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install playwright firebase-admin
          npx playwright install chromium --with-deps

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          COMPUZONE_ID: ${{ secrets.COMPUZONE_ID }}
          COMPUZONE_PW: ${{ secrets.COMPUZONE_PW }}
          CRAWL_BRAND: ${{ github.event.inputs.brand }}
        run: node crawler.js
